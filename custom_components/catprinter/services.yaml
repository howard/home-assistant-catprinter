print_image:
  name: Print image
  description: Print an image on a cat printer. The image is scaled to the paper width and dithered to black and white.
  target:
    entity:
      integration: catprinter
      domain: notify
  fields:
    image:
      name: Image
      description: An http(s) URL or a local file path (the directory must be in allowlist_external_dirs).
      required: true
      example: "/config/www/print.png"
      selector:
        text:
    energy:
      name: Energy
      description: Thermal energy / darkness, from 0 (lightest) to 65535 (darkest).
      required: false
      default: 65535
      selector:
        number:
          min: 0
          max: 65535
          mode: slider
    dither:
      name: Dithering
      description: Algorithm used to convert the image to black and white.
      required: false
      default: floyd-steinberg
      selector:
        select:
          options:
            - "floyd-steinberg"
            - "mean-threshold"
            - "none"

print_text:
  name: Print text
  description: Render text and print it on a cat printer.
  target:
    entity:
      integration: catprinter
      domain: notify
  fields:
    message:
      name: Message
      description: The text to print. Long lines are wrapped to the paper width.
      required: true
      example: "Feed the cat at 6pm!"
      selector:
        text:
          multiline: true
    energy:
      name: Energy
      description: Thermal energy / darkness, from 0 (lightest) to 65535 (darkest).
      required: false
      default: 65535
      selector:
        number:
          min: 0
          max: 65535
          mode: slider
    font_size:
      name: Font size
      description: Text height in pixels.
      required: false
      default: 24
      selector:
        number:
          min: 8
          max: 120
          mode: box
